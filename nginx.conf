events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|ico|webp|json|txt|woff|woff2|ttf|map)$ {
      try_files $uri =404;
      access_log off;
      expires 1h;
    }
  }
}